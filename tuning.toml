# EKF tuning: how much the filter trusts the gyro versus the measurements.
# This is the one place those numbers live. The sim reads it directly; the
# firmware will get a generated header from it once the MTi task lands, so the
# value you tune here is the value that ships. See docs/tuning.md.

# Process noise: how much each state is allowed to drift per step, as a
# variance. Larger means trust the gyro less and the measurements more.
[process_noise]
heading_deg2 = 0.01           # heading
roll_deg2 = 0.01              # roll
pitch_deg2 = 0.01             # pitch
# The MTi-3's in-run bias stability is 6 deg/h (datasheet); anything much
# looser lets a run of marginal fixes retrain the bias into a heading ramp for
# the next outage. One value covers all three body-axis biases (spec is per-axis).
gyro_bias_deg2_s2 = 0.000001  # slow gyro drift, per body axis, (deg/s)^2

# Startup uncertainty. Large is fine for the angles: it washes out within a
# few measurements, so it only sets how fast the filter converges from a cold
# start. The bias prior stays tight (sigma ~0.22 deg/s, the MTi-3's turn-on
# bias repeatability): it bounds how much heading drift the filter can ever
# attribute to the gyro, whatever the GNSS feeds it. One value seeds all three
# body-axis biases.
[initial_covariance]
heading_deg2 = 1000.0
roll_deg2 = 1000.0
pitch_deg2 = 1000.0
gyro_bias_deg2_s2 = 0.05

# How much to trust the MTi's reported roll and pitch on each sample. (GNSS
# heading noise is not here -- the receiver reports it per fix.)
[mti_noise]
roll_deg2 = 1.0
pitch_deg2 = 1.0

# MTi yaw (magnetometer) heading aiding. The yaw measures heading plus a
# learned offset (declination, boat iron, frame constant), which stiffens
# heading between GNSS fixes and keeps gyro bias observable through an outage,
# but never owns absolute heading. variance_deg2 is per-sample trust;
# p0_offset_deg2 sets how far the mag is trusted as absolute heading before
# the first GNSS fix. Remove this section to disable the measurement.
#
# q_offset_deg2 is deliberately loose: the mag's yaw error is not a constant
# indoors or near iron (it wanders with orientation, and the MTi re-converges
# after disturbances), and a stiff offset forces all that wander into the
# heading state instead, showing up as deg/s heading ramps whenever GNSS is
# out. At 1.0 the offset absorbs mag wander within seconds while the 100 Hz
# measurement keeps it bounded, so the mag still pins heading against gyro
# bias (sweep: outage drift range 69 -> 3.5 deg, 30 s bias hold 1.9 -> 1.5).
#
# q_offset_outage_deg2 (optional) is the offset random walk once GNSS has been
# gone longer than the outage grace. Unset, the loose q_offset_deg2 stands and
# heading coasts on the gyro: confidence decays within seconds and the rudder
# flags it invalid (the fail-safe). Set it small (e.g. 1e-4) to pin the offset
# for the outage, turning the mag into a genuine heading hold so the boat can
# steer through a long GNSS gap. Only sound with a clean mag whose absolute
# heading error is static over the outage; a wandering mag then steers heading
# confidently wrong. Characterize the boat's mag before enabling. See
# docs/tuning.md.
[mti_yaw]
variance_deg2 = 4.0
q_offset_deg2 = 1.0
p0_offset_deg2 = 100.0
# q_offset_outage_deg2 = 1e-4

# GNSS dual-antenna calibration. baseline_offset_deg is the antenna baseline
# heading measured clockwise from boat-forward; the bridge subtracts it so the
# filter sees boat heading. fallback_heading_variance_deg2 is used only when a
# fix arrives without a valid covariance.
[gnss]
baseline_offset_deg = 0.0
fallback_heading_variance_deg2 = 4.0

# IMU mounting offset, as ZYX Euler angles from boat axes to the IMU's axes.
# The filter rotates the MTi quaternion by this to recover boat attitude. Zero
# when the IMU is bolted square; see docs/attitude.md for the calibration.
[imu_mount]
mount_roll_deg = 0.0
mount_pitch_deg = 0.0
mount_yaw_deg = 0.0
