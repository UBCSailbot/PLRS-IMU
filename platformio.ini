[env]
lib_deps = https://github.com/simondlevy/TinyEKF.git
; deep+ so the LDF follows #includes inside lib/fusion/ekf_filter.h to find
; TinyEKF; default "chain" only scans src/test files, not project headers.
lib_ldf_mode = deep+
; off so the native env (no framework) does not reject TinyEKF as
; "framework incompatible" -- its library.properties has no frameworks field.
lib_compat_mode = off

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
; Regenerate include/tuning.h from tuning.toml before each firmware build.
extra_scripts = pre:scripts/gen_tuning.py
build_unflags = -std=gnu++17
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
    -std=gnu++23
    -I lib/mti_imu
    -I lib/septentrio_gnss
    -I lib/fusion
    -I lib/common
    -I lib/rudder_link
monitor_speed = 115200
test_framework = unity
test_filter = test_loopback

; RP2350 bring-up target (Adafruit Feather RP2350 HSTX). Inherits the pico
; build flags, includes, and tuning pre-script; only the board differs.
[env:feather_rp2350]
extends = env:pico
board = adafruit_feather_rp2350_hstx

; Full-rate capture firmware: same as pico, but PLRS_RAW_LOG drops the telemetry
; throttle so every predict tick is logged, for faithful offline replay/tuning.
; Flash with `pio run -e pico_rawlog -t upload`, capture, then flash `pico` again
; for normal 10 Hz telemetry. See docs/magnetometer.md.
[env:pico_rawlog]
extends = env:pico
build_flags =
    ${env:pico.build_flags}
    -D PLRS_RAW_LOG

[env:native]
platform = native
test_framework = unity
test_filter =
    test_xbus
    test_septentrio
    test_fusion
    test_rudder_link
build_flags =
    -std=c++23
    -Wall
    -Wextra
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_INCLUDE_FLOAT
    -I lib/mti_imu
    -I lib/septentrio_gnss
    -I lib/fusion
    -I lib/rudder_link
